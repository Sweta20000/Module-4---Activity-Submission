<!DOCTYPE html>
<html>
<head>
  <title>Sum of Arguments</title>
</head>
<body>
  <h2>Sweta’s Sum Function</h2>
  
  <input type="number" id="num1" placeholder="First number">
  <input type="number" id="num2" placeholder="Second number">
  <input type="number" id="num3" placeholder="Third number">
  <button onclick="showSum()">Calculate Sum</button>
  <h3 id="result">Result: </h3>
  <script>
    function sumArguments(...args) {
      return args.reduce((total, num) => total + num, 0);
    }
    function showSum() {
      let n1 = parseFloat(document.getElementById("num1").value) || 0;
      let n2 = parseFloat(document.getElementById("num2").value) || 0;
      let n3 = parseFloat(document.getElementById("num3").value) || 0;
      let res = sumArguments(n1, n2, n3);
      document.getElementById("result").innerHTML = "Result: " + res;
    }
  </script>
</body>
</html>
